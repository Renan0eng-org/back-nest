name: Deploy Backend Prefeitura (PM2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy com PM2
        run: |
          pm2 stop back-prefeitura || true
          pm2 delete back-prefeitura || true
          pm2 start dist/main.js --name back-prefeitura
          pm2 save
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL_PREFEITURA }}
          PORT: 4000