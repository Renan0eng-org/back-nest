name: Deploy Frontend Prefeitura (PM2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Ir para pasta do projeto
        run: cd ~/actions-runner/_work/web-prefeitura/web-prefeitura

      - name: Instalar dependências
        run: |
          cd ~/actions-runner/_work/web-prefeitura/web-prefeitura
          npm ci

      - name: Build
        run: |
          cd ~/actions-runner/_work/web-prefeitura/web-prefeitura
          npm run build

      - name: Start com PM2
        run: |
          cd ~/actions-runner/_work/web-prefeitura/web-prefeitura
          pm2 stop web-prefeitura || true
          pm2 delete web-prefeitura || true
          pm2 start npm --name web-prefeitura -- start
          pm2 save