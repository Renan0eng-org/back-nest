name: Deploy Backend Prefeitura (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login Docker Hub
      - name: Optional Docker Hub login
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          else
            echo "Skipping Docker Hub login: secrets not set"
          fi

      # Build da imagem
      - name: Build Docker image
        run: |
          docker build -t devnardi/back-prefeitura:latest .

      # Push da imagem
      - name: Push Docker image
        run: |
          docker push devnardi/back-prefeitura:latest

      # Remove container antigo
      - name: Stop and remove existing container
        run: |
          docker rm -f back-prefeitura || true

      # Remove imagem antiga local
      - name: Remove old image
        run: |
          docker rmi devnardi/back-prefeitura:latest || true

      # Pull imagem nova
      - name: Pull latest image
        run: |
          docker pull devnardi/back-prefeitura:latest

      # Run novo container
      - name: Run container
        run: |
          docker run -d \
            --name back-prefeitura \
            --restart unless-stopped \
            --network prefeitura-net \
            -p 4000:4000 \
            --env-file /home/github/envs/back-prefeitura.env \
            devnardi/back-prefeitura:latest

      - name: Wait container
        run: sleep 10

      - name: Run Prisma Seed
        run: |
          docker exec back-prefeitura npx prisma db seed
      # Limpeza
      - name: Prune unused images
        if: always()
        run: docker image prune -af