name: Deploy Backend Prefeitura (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Optional Docker Hub login
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          else
            echo "Skipping Docker Hub login: secrets not set"
          fi

      - name: Pull Docker image
        run: docker pull devnardi/back-prefeitura:latest

      - name: Stop and remove existing container
        run: |
          docker rm -f back-prefeitura || true

      - name: Run container
        run: |
          docker run -d \
            --name back-prefeitura \
            --restart unless-stopped \
            -p 4000:4000 \
            --env-file /home/github/envs/back-prefeitura.env \
            -e CORS="https://prefeitura.renannardi.com,https://www.prefeitura.renannardi.com" \
            devnardi/back-prefeitura:latest

      - name: Prune unused images
        if: always()
        run: docker image prune -f