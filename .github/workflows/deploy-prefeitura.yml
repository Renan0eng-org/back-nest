name: Build Backend Prefeitura (Docker)

on:
  push:
    branches:
      - prefeitura

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: prefeitura

      - name: Optional Docker Hub login
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          else
            echo "Skipping Docker Hub login: secrets not set"
          fi

      - name: Build Docker image
        run: |
          docker build -t devnardi/back-prefeitura:prefeitura .

      - name: Push Docker image
        run: |
          docker push devnardi/back-prefeitura:prefeitura
